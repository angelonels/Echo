version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: echo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: echodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: echo-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
